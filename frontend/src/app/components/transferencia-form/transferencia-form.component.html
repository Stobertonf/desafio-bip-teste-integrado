<div class="container mt-4">
  <h2>Transferência entre Benefícios</h2>
  
  <div *ngIf="mensagem" class="alert alert-success" style="background-color: #d4edda; color: #155724; padding: 15px; border-radius: 5px; margin-bottom: 20px; text-align: center; font-weight: bold;">
    {{ mensagem }}
  </div>
  
  <div *ngIf="erro" class="alert alert-danger" style="background-color: #f8d7da; color: #721c24; padding: 15px; border-radius: 5px; margin-bottom: 20px; text-align: center; font-weight: bold;">
    {{ erro }}
  </div>
  
  <form [formGroup]="transferenciaForm" (ngSubmit)="onSubmit()">
    <div class="mb-3">
      <label for="origemId" class="form-label">Benefício de Origem:</label>
      <select class="form-control" formControlName="origemId" id="origemId">
        <option value="">Selecione um benefício...</option>
        <option *ngFor="let b of beneficios" [value]="b.id">
          {{ b.tipo }} - R$ {{ formatarValor(b.saldo || 0) }} ({{ b.beneficiarioNome }})
        </option>
      </select>
      <div *ngIf="transferenciaForm.get('origemId')?.invalid && transferenciaForm.get('origemId')?.touched" 
           class="text-danger">
        Campo obrigatório
      </div>
    </div>
    
    <div class="mb-3">
      <label for="destinoId" class="form-label">Benefício de Destino:</label>
      <select class="form-control" formControlName="destinoId" id="destinoId">
        <option value="">Selecione um benefício...</option>
        <option *ngFor="let b of beneficios" [value]="b.id">
          {{ b.tipo }} - R$ {{ formatarValor(b.saldo || 0) }} ({{ b.beneficiarioNome }})
        </option>
      </select>
      <div *ngIf="transferenciaForm.get('destinoId')?.invalid && transferenciaForm.get('destinoId')?.touched" 
           class="text-danger">
        Campo obrigatório
      </div>
    </div>
    
    <div class="mb-3">
      <label for="valor" class="form-label">Valor (R$):</label>
      <input type="number" class="form-control" formControlName="valor" 
             id="valor" step="0.01" min="0.01">
      <div *ngIf="transferenciaForm.get('valor')?.invalid && transferenciaForm.get('valor')?.touched" 
           class="text-danger">
        Valor deve ser positivo
      </div>
    </div>
    
    <button type="submit" class="btn btn-primary" 
            [disabled]="transferenciaForm.invalid || loading">
      {{ loading ? 'Processando...' : 'Transferir' }}
    </button>
    <a routerLink="/beneficios" class="btn btn-secondary ms-2">Voltar</a>
  </form>
</div>
